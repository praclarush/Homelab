services:
  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/docker/stacks:/opt/docker/stacks        # <-- Pointing to /opt now
      - ./data:/app/data
    environment:
      - DOCKGE_STACKS_DIR=/opt/docker/stacks         # <-- Pointing to /opt now