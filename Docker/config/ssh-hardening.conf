# Recommended drop-in for /etc/ssh/sshd_config.d/10-ssh-hardening.conf
#
# Reference only -- see config/README.md and
# guides/operations/ssh-management-guide.md (Section 7: Hardening sshd).
# Must be named to sort alphabetically before 50-cloud-init.conf so its
# settings take precedence (sshd applies the first value it encounters
# for a given directive).
#
# Do not install this until you've confirmed at least one key-based
# login to the host works -- disabling password auth before that can
# lock out all access.

PasswordAuthentication no
PermitRootLogin prohibit-password
PubkeyAuthentication yes
