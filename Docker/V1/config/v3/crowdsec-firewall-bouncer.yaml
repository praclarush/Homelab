# This is NOT a complete file. The full config is generated on the
# host by the crowdsec-firewall-bouncer-nftables package installer
# (apt/packagecloud). This repo's guide only documents the two values
# below; the rest of the installed file's contents come from the
# package, not from this repository, and are not reproduced here.
#
# Source: guides/stacks/infrastructure-networking-v3-guide.md
# section 5 (Install the Firewall Bouncer)
#
# Stack/container: infrastructure-networking -- crowdsec (agent runs
# in Docker; this bouncer config is for the host-installed package
# that acts on the agent's decisions, not the container itself).

api_url: http://localhost:8080
# ^ Where the bouncer reaches the crowdsec agent's local API.

api_key: <paste key here>
# ^ Generated per-bouncer via:
#     docker exec crowdsec cscli bouncers add firewall-bouncer
#   Paste that command's output here. Do not commit a real key to
#   version control -- this file is a template, not a deployed config.
