services:
  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    ports:
      - "${VLAN11_IP}:5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/docker/stacks:/opt/docker/stacks
      - ./data:/app/data
    environment:
      - DOCKGE_STACKS_DIR=/opt/docker/stacks
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
