# /etc/netplan/00-installer-config.yaml -- complete file
#
# Reference only -- see config/README.md. The guide has you REPLACE
# the entire contents of this file (not append to it).
#
# Source: guides/getting-started/homelab-guide.md (Configure the
# Trunk Port and VLAN Sub-Interfaces)
#
# This is the actual file in use on the mini PC (confirmed against
# `ip addr` on the host). If you reimage the host or swap hardware,
# the interface name may differ -- check with `ip link show` first.

network:
  version: 2
  renderer: networkd
  ethernets:
    # VLAN 11 (Services) -- the untagged/native VLAN on this switch
    # port, so it's configured directly on the physical interface
    # rather than as a tagged VLAN sub-interface. Every stack except
    # media-gaming binds its host ports here: dashboards-automation,
    # dockge, infrastructure-networking, auth, tools, llm.
    enp171s0:
      dhcp4: false
      addresses:
        - 192.168.11.10/24
      routes:
        - to: default
          via: 192.168.11.1
      # Points at the host's own Pi-hole once infrastructure-networking
      # is deployed -- intentional, do not change. See
      # guides/getting-started/homelab-guide.md.
      nameservers:
        addresses: [127.0.0.1]
  vlans:
    # VLAN 61 (NAS) -- tagged. The Synology NAS lives here; media-gaming
    # (Immich, Jellyfin, AMP, Audiobookshelf, Kavita) binds its host
    # ports on this same VLAN for same-subnet NFS access to NAS storage.
    # No default route or nameserver entry -- this interface is reached
    # only for media-gaming's bound services and NAS access, not used
    # for general host traffic. See guides/networking/vlan-reference.md.
    vlan61:
      id: 61
      link: enp171s0
      addresses:
        - 192.168.61.10/24
