networks:
  proxy_net:
    name: proxy_net
    external: false

services:
  nginx-proxy-manager:
    container_name: nginx_proxy_manager
    image: 'jc21/nginx-proxy-manager:latest'
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "${VLAN11_IP}:81:81"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    cap_add:
      - NET_ADMIN
    ports:
      - "0.0.0.0:53:53/tcp"
      - "0.0.0.0:53:53/udp"
      - "${VLAN11_IP}:8080:80/tcp"
    environment:
      - TZ=America/Chicago
      - FTLCONF_webserver_api_password=${PIHOLE_PASSWORD}
      - FTLCONF_dns_listeningMode=all
    volumes:
      - ./pihole/config:/etc/pihole
      - ./pihole/dnsmasq:/etc/dnsmasq.d
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net

  watchtower:
    container_name: watchtower
    image: nickfedor/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_NOTIFICATION_URL=ntfy://watchtower:${WATCHTOWER_NTFY_PASS}@ntfy/${WATCHTOWER_NTFY_TOPIC}?scheme=http
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net

  ntfy:
    container_name: ntfy
    image: binwiederhier/ntfy:latest
    command: serve
    environment:
      - NTFY_AUTH_FILE=/var/lib/ntfy/auth.db
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
      - NTFY_ENABLE_LOGIN=true
      - NTFY_BEHIND_PROXY=true
    volumes:
      - ./ntfy/cache:/var/cache/ntfy
      - ./ntfy/config:/etc/ntfy
      - ./ntfy/lib:/var/lib/ntfy
    ports:
      - "${VLAN11_IP}:8082:80"
      - "${MESHNET_IP}:8082:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net

  tailscale:
    container_name: tailscale
    image: tailscale/tailscale:latest
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    volumes:
      - ./tailscale/state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_DEBUG_FIREWALL_MODE=nftables
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped

  crowdsec:
    container_name: crowdsec
    image: crowdsecurity/crowdsec:latest
    environment:
      - GID=1000
      - COLLECTIONS=crowdsecurity/nginx
    volumes:
      - ./crowdsec/config:/etc/crowdsec
      - ./crowdsec/data:/var/lib/crowdsec/data
      - ./npm/logs:/var/log/npm:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net

  postfix-relay:
    container_name: postfix_relay
    image: boky/postfix:latest
    environment:
      - ALLOWED_SENDER_DOMAINS=${DOMAIN}
      - RELAYHOST=[smtp.gmail.com]:587
      - RELAYHOST_USERNAME=${SMTP_RELAY_USERNAME}
      - RELAYHOST_PASSWORD=${SMTP_RELAY_PASSWORD}
      - MYNETWORKS=127.0.0.0/8,192.168.11.0/24,192.168.61.0/24,172.18.0.0/16
    ports:
      - "${VLAN11_IP}:25:25"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net
