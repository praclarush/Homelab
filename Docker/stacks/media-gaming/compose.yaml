networks:
  proxy_net:
    external: true

services:
  amp:
    container_name: amp
    image: cubecoders/amp:latest
    tty: true
    stdin_open: true
    ports:
      - "${VLAN61_IP}:8081:8081"
      - "${VLAN61_IP}:25565:25565"
    volumes:
      - ./amp/datastore:/home/amp/.ampdata
    restart: unless-stopped
    environment:
      - UID=1000
      - GID=1000
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - proxy_net

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    volumes:
      - /mnt/synology/immich:/usr/src/app/upload
      - ./immich/cache:/usr/src/app/cache
    env_file:
      - .env
    environment:
      - DB_HOSTNAME=immich_postgres
      - REDIS_HOSTNAME=immich_redis
      - MACHINE_LEARNING_URL=http://immich_machine_learning:3003
    ports:
      - "${VLAN61_IP}:2283:2283"
      - "${MESHNET_IP}:2283:2283"
      - "${TAILSCALE_IP}:2283:2283"
    devices:
      - /dev/dri:/dev/dri
    depends_on:
      immich-database:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - proxy_net

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumes:
      - ./immich/model-cache:/cache
    mem_limit: 3g
    restart: unless-stopped
    networks:
      - proxy_net

  immich-database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.2-pgvectors0.2.0
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE_NAME}
    volumes:
      - ./immich/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_DATABASE_NAME} -U ${DB_USERNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - proxy_net

  immich-postgres-backup:
    container_name: immich_postgres_backup
    image: prodrigestivill/postgres-backup-local:14
    environment:
      - POSTGRES_HOST=immich_postgres
      - POSTGRES_DB=${DB_DATABASE_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
    volumes:
      - /mnt/synology/backups/postgres-dumps/immich:/backups
    depends_on:
      immich-database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - proxy_net

  immich-redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine
    volumes:
      - ./immich/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - proxy_net

  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin:latest
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /mnt/synology/media:/media:ro
    devices:
      - /dev/dri:/dev/dri
    ports:
      - "${VLAN61_IP}:8096:8096"
      - "${MESHNET_IP}:8096:8096"
    environment:
      - TZ=America/Chicago
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net

  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    environment:
      - TZ=America/Chicago
    volumes:
      - ./audiobookshelf/config:/config
      - ./audiobookshelf/metadata:/metadata
      - /mnt/synology/audiobooks:/audiobooks
      - /mnt/synology/podcasts:/podcasts
    ports:
      - "${VLAN61_IP}:13378:80"
      - "${MESHNET_IP}:13378:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net

  kavita:
    container_name: kavita
    image: ghcr.io/kareadita/kavita:latest
    volumes:
      - ./kavita/config:/kavita/config
      - /mnt/synology/books:/books
    ports:
      - "${VLAN61_IP}:5000:5000"
      - "${MESHNET_IP}:5000:5000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net

  dispatcharr:
    container_name: dispatcharr
    image: ghcr.io/dispatcharr/dispatcharr:latest
    volumes:
      - ./dispatcharr/data:/data
    ports:
      - "${VLAN11_IP}:9191:9191"
    environment:
      - TZ=America/Chicago
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net

  iptv-epg:
    container_name: iptv_epg
    image: ghcr.io/iptv-org/epg:master
    volumes:
      - ./iptv-epg/channels.xml:/epg/public/channels.xml:ro
      - ./iptv-epg/guides:/epg/public/guides
    ports:
      - "${VLAN11_IP}:9192:3000"
    environment:
      - TZ=America/Chicago
      - CRON_SCHEDULE=0 6 * * *
    restart: unless-stopped
    networks:
      - proxy_net
