# /etc/netplan/00-installer-config.yaml -- complete file
#
# STAGED, NOT DEPLOYED. See this folder's README.md for what's blocking
# it (second NIC name confirmation, second cable run, switch port
# reconfiguration) and the deployment steps.
#
# This is a full replacement for
# Docker/V2/config/netplan-00-installer-config.yaml, not a diff --
# `netplan apply` reads the whole file.
#
# CHANGE FROM V2: VLAN 61 moves off a tagged sub-interface riding on
# enp171s0 onto its own dedicated physical NIC (the Beelink EQi13's
# second onboard port, previously unused). No 802.1Q tagging on the
# host at all afterward -- each physical port is a plain untagged/
# access interface on exactly one VLAN.
#
# <SECOND_NIC_NAME> is a placeholder. The kernel enumerates every NIC
# it detects regardless of cable/link state, so confirm the real name
# with `ip link show` on the host before deploying -- no need to wait
# until the second cable is run.

network:
  version: 2
  renderer: networkd
  ethernets:
    # VLAN 11 (Services) -- unchanged from V2. Untagged/native on this
    # NIC's switch port. Every stack except media-gaming binds here.
    enp171s0:
      dhcp4: false
      addresses:
        - 192.168.11.10/24
      routes:
        - to: default
          via: 192.168.11.1
      # Points at the host's own Pi-hole once infrastructure-networking
      # is deployed -- intentional, do not change.
      nameservers:
        addresses: [127.0.0.1]

    # VLAN 61 (NAS) -- NEW: dedicated physical NIC, untagged/access on
    # its own switch port. Replaces the tagged `vlan61` sub-interface
    # from the V2 config. media-gaming (Immich, Jellyfin, AMP,
    # Audiobookshelf, Kavita) binds its host ports here for same-subnet
    # NFS access to the Synology NAS. No default route or nameserver --
    # same as the interface it replaces. This NIC is reached only for
    # media-gaming's bound services and NAS access, not general host
    # traffic; a second default route here would fight the VLAN 11
    # default route for priority.
    <SECOND_NIC_NAME>:
      dhcp4: false
      addresses:
        - 192.168.61.10/24

# ---------------------------------------------------------------------
# Optional hardening: match by MAC address instead of kernel-assigned
# name. Both NICs are likely the same make/model, so there is a small
# but real chance they enumerate in the opposite order after a firmware
# or kernel update, silently swapping which VLAN each port lands on.
# If you want to pin this down, replace the <SECOND_NIC_NAME> block
# above with:
#
#   eth-vlan61:
#     match:
#       macaddress: "<SECOND_NIC_MAC>"
#     set-name: eth-vlan61
#     dhcp4: false
#     addresses:
#       - 192.168.61.10/24
#
# Get the MAC address with `ip link show <SECOND_NIC_NAME>` before
# deploying. The same could be done for enp171s0, but it's been stable
# since initial setup, so it's left as-is here.
