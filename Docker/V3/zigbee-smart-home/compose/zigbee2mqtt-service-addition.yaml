# Add this service to Docker/V2/stacks/dashboards-automation/compose.yaml
# (indent to match the existing `services:` block).
#
# No `devices:` USB passthrough needed -- the SLZB-06 coordinator is
# network-attached (see zigbee2mqtt/configuration-template.yaml), so this
# container never touches host hardware.

  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: ghcr.io/koenkk/zigbee2mqtt:latest
    volumes:
      - ./zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    ports:
      - "${VLAN11_IP}:8086:8080"
    environment:
      - TZ=America/Chicago
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://mosquitto:1883
      - ZIGBEE2MQTT_CONFIG_MQTT_USER=${ZIGBEE2MQTT_MQTT_USER}
      - ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD=${ZIGBEE2MQTT_MQTT_PASSWORD}
    depends_on:
      - mosquitto
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    networks:
      - proxy_net
