# /etc/netplan/00-installer-config.yaml -- complete file, homelab v1
#
# Reference only -- see config/README.md. This guide has you REPLACE
# the entire contents of this file (not append to it).
#
# Source: guides/getting-started/homelab-v1-guide.md section 2.5
# (Configure the Trunk Port and VLAN Sub-Interfaces)
#
# Before using:
#   - The actual filename under /etc/netplan/ may differ
#     (e.g. 01-netcfg.yaml) -- check with `ls /etc/netplan/` first.
#   - Replace "eth0" everywhere with your host's real interface name,
#     found via `ip link show` (common names: eth0, ens18, enp3s0).
#   - Replace the VLAN 11 and VLAN 61 addresses/gateway below with
#     your actual subnet if it differs from the example used
#     throughout these guides.

network:
  version: 2
  ethernets:
    eth0:
      dhcp4: false
  vlans:
    # VLAN 11 (Services) -- the untagged/native VLAN. Every stack
    # except media-gaming binds its host ports here:
    # dashboards-automation, dockge, infrastructure-networking, auth,
    # tools, llm.
    eth0.11:
      id: 11
      link: eth0
      addresses:
        - 192.168.11.10/24
      routes:
        - to: default
          via: 192.168.11.1
      # Points at the host's own Pi-hole once infrastructure-networking
      # is deployed -- intentional, do not change. See
      # guides/getting-started/homelab-v1-guide.md section 2.5.
      nameservers:
        addresses: [127.0.0.1]

    # VLAN 61 (NAS) -- tagged. The Synology NAS lives here; media-gaming
    # (Immich, Jellyfin, AMP, and Audiobookshelf/Kavita from v3) binds
    # its host ports on this same VLAN for same-subnet NFS access to
    # NAS storage. No default route or nameserver entry -- this
    # interface is reached only for media-gaming's bound services and
    # NAS access, not used for general host traffic. See
    # guides/networking/vlan-reference.md.
    eth0.61:
      id: 61
      link: eth0
      addresses:
        - 192.168.61.10/24
