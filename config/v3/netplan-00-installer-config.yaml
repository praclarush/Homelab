# /etc/netplan/00-installer-config.yaml -- complete file, homelab v3
#
# Reference only -- see config/README.md.
#
# Unchanged since v1/v2. None of the three "v3" stack guides
# (dashboards-automation, infrastructure-networking, media-gaming)
# modify VLAN interfaces. Reproduced here for a complete snapshot at
# this version step.
#
# Before using: replace "eth0" with your real interface name (check
# `ip link show`), and adjust addresses if your subnets differ.

network:
  version: 2
  ethernets:
    eth0:
      dhcp4: false
  vlans:
    # VLAN 11 (Services). v3 adds Loki/Promtail (dashboards-automation)
    # and CrowdSec (infrastructure-networking), both bound here.
    eth0.11:
      id: 11
      link: eth0
      addresses:
        - 192.168.11.10/24
      routes:
        - to: default
          via: 192.168.11.1
      nameservers:
        addresses: [127.0.0.1]

    # VLAN 61 (Media). v3 adds Audiobookshelf and Kavita to
    # media-gaming, bound here alongside Immich, Jellyfin, and AMP.
    eth0.61:
      id: 61
      link: eth0
      addresses:
        - 192.168.61.10/24
