# /etc/netplan/00-installer-config.yaml -- complete file, homelab v2
#
# Reference only -- see config/README.md.
#
# Unchanged since v1. guides/getting-started/homelab-v2-guide.md's
# prerequisite note states the v1 VLAN trunk/sub-interface config
# (this file) must already be in place before deploying v2 -- it does
# not modify it further. Reproduced here for a complete snapshot at
# this version step.
#
# Before using: replace "eth0" with your real interface name (check
# `ip link show`), and adjust addresses if your subnets differ.

network:
  version: 2
  ethernets:
    eth0:
      dhcp4: false
  vlans:
    # VLAN 11 (Services). v2 adds Uptime Kuma, Grafana, Prometheus,
    # node-exporter (dashboards-automation), ntfy/Tailscale
    # (infrastructure-networking), and the new auth and tools stacks --
    # all bound to this VLAN.
    eth0.11:
      id: 11
      link: eth0
      addresses:
        - 192.168.11.10/24
      routes:
        - to: default
          via: 192.168.11.1
      nameservers:
        addresses: [127.0.0.1]

    # VLAN 61 (Media). v2 adds Jellyfin to media-gaming, bound here
    # alongside Immich and AMP.
    eth0.61:
      id: 61
      link: eth0
      addresses:
        - 192.168.61.10/24
