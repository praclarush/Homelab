# /etc/netplan/00-installer-config.yaml -- complete file, homelab v4
#
# Reference only -- see config/README.md.
#
# Unchanged since v1. tools v4 (Actual Budget, Paperless-ngx) does not
# touch host networking. Reproduced here for a complete snapshot at
# this version step.
#
# Before using: replace "eth0" with your real interface name (check
# `ip link show`), and adjust addresses if your subnets differ.

network:
  version: 2
  ethernets:
    eth0:
      dhcp4: false
  vlans:
    # VLAN 11 (Services). v4 adds Actual Budget and Paperless-ngx
    # (plus its dedicated Postgres/Redis) to the tools stack, bound
    # here.
    eth0.11:
      id: 11
      link: eth0
      addresses:
        - 192.168.11.10/24
      routes:
        - to: default
          via: 192.168.11.1
      nameservers:
        addresses: [127.0.0.1]

    # VLAN 61 (NAS). The Synology NAS lives here; media-gaming binds
    # its host ports here for same-subnet NFS access. No changes at v4.
    # See guides/networking/vlan-reference.md.
    eth0.61:
      id: 61
      link: eth0
      addresses:
        - 192.168.61.10/24
