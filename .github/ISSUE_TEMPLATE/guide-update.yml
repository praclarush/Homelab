name: Guide Update
description: Documentation under Guides/ is missing, outdated, or incorrect.
labels:
  - documentation
body:
  - type: input
    id: guide
    attributes:
      label: Guide file
      description: Path under Guides/, or "new guide" if it doesn't exist yet.
      placeholder: e.g. Guides/stacks/tools-guide.md
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What needs to change
    validations:
      required: true
